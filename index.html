<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KoreShelf</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <style>
        /* Animazione e stile per la freccia di scroll */
        @keyframes bounce-glass {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0) translateX(-50%); }
            40% { transform: translateY(-10px) translateX(-50%); }
            60% { transform: translateY(-5px) translateX(-50%); }
        }

        .glass-scroll-arrow {
            display: none;
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            z-index: 1001;
            pointer-events: none;
            animation: bounce-glass 2.5s infinite;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: opacity 0.4s ease;
        }

        /* Nasconde la scrollbar nativa ma mantiene lo scorrimento attivo */
        #pdf-container::-webkit-scrollbar { display: none; }
        #pdf-container {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
  </head>
  <body>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script src="reader.js"></script>
    <script type="module" src="/src/main.js"></script>
    
    <div id="loading-screen" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #1e2d3b; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease;">
        <div class="loader"></div>
        <h2 style="color: white; font-family: sans-serif; margin-top: 20px; letter-spacing: 2px;">KoreShelf</h2>
        <p id="loading-text" style="color: rgba(255,255,255,0.5); font-family: sans-serif; font-size: 14px;">Inizializzazione libreria...</p>
    </div>

    <style>
        /* Una semplice animazione a cerchio che ruota */
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #4da6ff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <div id="reader-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #faf9f6; z-index: 999; opacity: 0; transition: opacity 0.8s ease;">

        <div id="viewer" style="position: absolute; top: 60px; left: 10px; right: 10px; bottom: 40px; overflow: hidden;"></div>
        
        <div id="pdf-container" style="display: none; position: absolute; top: 60px; left: 10px; right: 10px; bottom: 20px; overflow: auto; flex-direction: column; align-items: center; justify-content: center;">
             <canvas id="pdf-canvas" style="display: block; margin: 0 auto; max-width: 100%; height: auto;"></canvas>
        </div>

        <div id="scroll-indicator" class="glass-scroll-arrow">↓</div>

        <button id="prev-page-btn" style="position: absolute; top: 50%; left: 10px; font-size: 24px; background: rgba(100,100,100,0.4); border-radius: 50%; color: white; border: none; cursor: pointer; z-index: 10; width: 45px; height: 45px; transform: translateY(-50%);">&#10094;</button>
        <button id="next-page-btn" style="position: absolute; top: 50%; right: 10px; font-size: 24px; background: rgba(100,100,100,0.4); border-radius: 50%; color: white; border: none; cursor: pointer; z-index: 10; width: 45px; height: 45px; transform: translateY(-50%);">&#10095;</button>
    </div>

    <button id="help-btn" class="glass-effect modern-btn" style="position: fixed; bottom: 30px; right: 30px; border-radius: 50%; width: 55px; height: 55px; font-size: 26px; padding: 0; z-index: 100; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.4);">
        ?
    </button>
  </body>
</html>
