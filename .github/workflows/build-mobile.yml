name: Compila App Mobile (Android e iOS)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Ti permette di avviare la build manualmente da GitHub!

jobs:
  # COMPILAZIONE ANDROID (Gira su macchina virtuale Linux)
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica Codice Sorgente
        uses: actions/checkout@v4

      - name: Installa Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # CORREZIONE: Forziamo l'installazione della versione stabile di Capacitor 6 per evitare conflitti nativi
      - name: Installa Dipendenze e Compila Frontend
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/core@6 @capacitor/android@6 @capacitor/filesystem@6 --legacy-peer-deps
          npm run build

      - name: Configura Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Inizializza e Sincronizza Capacitor per Android
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Compila APK (Gradle)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Rinomina l'APK per il download
        run: mv android/app/build/outputs/apk/debug/app-debug.apk KoreShelf-Android.apk

      - name: Carica APK Android come allegato scaricabile
        uses: actions/upload-artifact@v4
        with:
          name: KoreShelf-Android
          path: KoreShelf-Android.apk

  # COMPILAZIONE iOS (Gira su macchina virtuale macOS di GitHub)
  build-ios:
    runs-on: macos-14
    steps:
      - name: Scarica Codice Sorgente
        uses: actions/checkout@v4

      - name: Installa Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # CORREZIONE: Forziamo l'installazione della versione stabile di Capacitor 6 per evitare conflitti nativi
      - name: Installa Dipendenze e Compila Frontend
        run: |
          npm install --legacy-peer-deps
          npm install @capacitor/core@6 @capacitor/ios@6 @capacitor/filesystem@6 --legacy-peer-deps
          npm run build

      - name: Inizializza e Sincronizza Capacitor per iOS
        run: |
          npx cap add ios || true
          npx cap sync ios

      # Genera la Xcode Workspace nativa tramite CocoaPods pre-installato sul Mac di GitHub
      - name: Installa Dipendenze CocoaPods Nativo
        run: |
          cd ios/App
          pod install

      - name: Compila Progetto iOS (Unsigned App)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App -configuration Debug -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO

      - name: Impacchetta in formato .ipa per Sideloading (AltStore/Sideloadly)
        run: |
          cd build/Build/Products/Debug-iphoneos
          mkdir Payload
          cp -r App.app Payload/
          zip -vr KoreShelf-iOS.ipa Payload/
          rm -rf Payload

      - name: Carica pacchetto iOS come allegato scaricabile
        uses: actions/upload-artifact@v4
        with:
          name: KoreShelf-iOS
          path: build/Build/Products/Debug-iphoneos/KoreShelf-iOS.ipa