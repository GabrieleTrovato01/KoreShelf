name: Build KoreShelf

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Ti permette di avviare la build manualmente da GitHub!

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: node18-win-x64
            output_name: koreshelf.exe
            artifact_name: KoreShelf-Windows
            
          - os: ubuntu-latest
            target: node18-linux-x64
            output_name: koreshelf-linux
            artifact_name: KoreShelf-Linux
            
          # Versione Nativa per i nuovi Mac M1/M2/M3 (Apple Silicon)
          - os: macos-latest
            target: node18-macos-arm64
            output_name: koreshelf-macos-arm
            artifact_name: KoreShelf-macOS-AppleSilicon

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Frontend (Vite)
        run: npm run build

      - name: Bundle Backend (esbuild)
        run: npx esbuild server.js --bundle --platform=node --format=cjs --packages=external --outfile=build-output/server.bundle.js

      - name: Package Executable with pkg
        run: npx pkg package.json --targets ${{ matrix.target }} --output ${{ matrix.output_name }}
      
      - name: Prepare Release Folder (Include Sharp binaries)
        shell: bash
        run: |
          mkdir release_build
          mv ${{ matrix.output_name }} release_build/
          
          mkdir -p release_build/node_modules
          
          # Copiamo l'intera cartella sharp per non perdere i file .so di Linux e macOS
          cp -r node_modules/sharp release_build/node_modules/
          
          # Nelle versioni recenti di sharp, i file nativi sono salvati qui
          if [ -d "node_modules/@img" ]; then
            cp -r node_modules/@img release_build/node_modules/
          fi
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release_build/